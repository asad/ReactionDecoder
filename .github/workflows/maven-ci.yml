# Fast CI for pushes and pull requests. Heavy regression and benchmarks stay out
# of the default path.

name: CI

on:
  push:
    branches:
      - 'master'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fast-tests:
    name: Fast Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: 'maven'

    - name: Run fast regression suite
      run: mvn -B -ntp clean test --file pom.xml

    - name: Upload test reports on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: surefire-reports
        path: target/surefire-reports

  publish:
    name: Publish Package
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: fast-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: 'maven'
        server-id: github
        settings-path: ${{ github.workspace }}

    - name: Publish to GitHub Packages Apache Maven
      run: mvn -B -ntp deploy -Dmaven.test.skip=true -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN: ${{ github.token }}
